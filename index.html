<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pausuu Games</title>

  <style>
    body {
      margin: 0;
      background: #0d0d0d;
      color: #fff;
      font-family: "Inter", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 80px;
    }

    h1 {
      font-size: 2.6rem;
      margin-bottom: 40px;
    }

    .game-button {
      width: 260px;
      padding: 15px 20px;
      margin: 12px 0;
      background: #ffffff10;
      border: 1px solid #ffffff25;
      border-radius: 8px;
      color: #fff;
      font-size: 1.2rem;
      text-align: center;
      text-decoration: none;
      transition: 0.25s ease;
    }

    .game-button:hover {
      background: #ffffff20;
      transform: translateY(-4px);
    }
  </style>
</head>

<body>

  <h1>Pausuu Games</h1>

  <!-- Monkey Mart -->
  <a class="game-button" href="https://pausuu1.github.io/MonkeyMart" target="_blank">
    Monkey Mart
  </a>

  <!-- FNAF 1 -->
  <a class="game-button" href="https://pausuu1.github.io/FNAF1" target="_blank">
    Five Nights at Freddy's 1
  </a>

  <!-- FNAF 2 -->
  <a class="game-button" href="https://pausuu1.github.io/FNAF2" target="_blank">
    Five Nights at Freddy's 2
  </a>

  <!-- FNAF 3 -->
  <a class="game-button" href="https://pausuu1.github.io/FNAF3" target="_blank">
    Five Nights at Freddy's 3
  </a>

</body>
</html>
